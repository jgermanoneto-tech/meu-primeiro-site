<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Primeiro Site</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.caixa{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    width:320px;
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:15px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#0066ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#004dcc;
}

#resultado{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="caixa">

<h1>🎂 Feliz Aniversário</h1>

<p>Digite sua data de nascimento:</p>

<input type="date" id="data">

<button onclick="verificar()">
Verificar
</button>

<div id="resultado"></div>

</div>

<script>

function verificar(){

    let data = document.getElementById("data").value;

    if(data==""){
        document.getElementById("resultado").innerHTML =
        "Escolha uma data.";
        return;
    }

    let partes = data.split("-");

    let diaNascimento = parseInt(partes[2]);
    let mesNascimento = parseInt(partes[1]);

    let hoje = new Date();

    let diaHoje = hoje.getDate();
    let mesHoje = hoje.getMonth() + 1;

    if(diaNascimento === diaHoje && mesNascimento === mesHoje){

        document.getElementById("resultado").innerHTML =
        "🎉 Parabéns! Hoje é o seu aniversário! 🥳";

    }else{

        document.getElementById("resultado").innerHTML =
        "😊 Hoje não é seu aniversário.";

    }

}

</script>

</body>
</html>
